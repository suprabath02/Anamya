<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Woodland Invitation</title>
<style>
/* =====================================================================
   ┌──────────────────────────────────────────────────────────────┐
   │  EDIT YOUR DETAILS in the CONFIG block at the bottom (<script>).│
   │  Whimsical-woodland theme: ferns, vines, birds, butterflies,    │
   │  bees, dragonflies, a fox & a deer. Warm but understated copy.  │
   └──────────────────────────────────────────────────────────────┘
   ===================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Quicksand:wght@400;500;600&display=swap');

:root {
  --ink: #2c3a2b;          /* deep forest ink */
  --moss: #5c7a4a;         /* moss green */
  --fern: #3f6b3a;         /* fern */
  --bark: #7a5a3c;         /* bark brown */
  --bloom: #c96a8a;        /* soft wildflower pink (the one romantic note) */
  --honey: #d9a441;        /* honey/amber */
  --cream: #f5f3e7;        /* paper cream */
  --sky: #e7f0e4;          /* pale leaf */
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0; min-height: 100%;
  font-family: 'Quicksand', sans-serif;
  color: var(--ink);
  overflow-x: hidden;
}

/* layered woodland wash — pure CSS, no images */
body {
  background:
    radial-gradient(ellipse 40% 34% at 8% 90%, rgba(63,107,58,0.55), transparent 60%),
    radial-gradient(ellipse 34% 30% at 92% 86%, rgba(92,122,74,0.55), transparent 62%),
    radial-gradient(ellipse 30% 26% at 85% 14%, rgba(217,164,65,0.32), transparent 60%),
    radial-gradient(ellipse 30% 24% at 15% 12%, rgba(201,106,138,0.28), transparent 62%),
    linear-gradient(170deg, #eef4e6 0%, #e2eede 40%, #d6e7d2 70%, #cfe0c9 100%);
  background-attachment: fixed;
}
/* faint canvas grain */
body::before {
  content:""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: 0.06;
  background-image:
    repeating-linear-gradient(118deg, rgba(44,58,43,0.6) 0 1px, transparent 1px 5px),
    repeating-linear-gradient(22deg, rgba(44,58,43,0.5) 0 1px, transparent 1px 6px);
  mix-blend-mode: multiply;
}

/* ---------- decorative corner foliage (SVG) ---------- */
.foliage { position: fixed; z-index: 1; pointer-events: none; width: min(38vw, 360px); opacity: 0.9; }
.foliage.tl { top: -10px; left: -10px; }
.foliage.br { bottom: -10px; right: -10px; transform: rotate(180deg); }

/* ---------- long side creepers (SVG, full height, leaning inward) ---------- */
.creeper { position: fixed; top: 0; bottom: 0; z-index: 1; pointer-events: none;
  width: min(26vw, 230px); height: 100%; opacity: 0.95; }
.creeper svg { width: 100%; height: 100%; }
.creeper.left  { left: 0; }
.creeper.right { right: 0; transform: scaleX(-1); }
/* gentle breeze on the leaves/flowers */
.creeper .sway { transform-box: fill-box; transform-origin: left center; animation: creepSway 6s ease-in-out infinite alternate; }
.creeper .sway:nth-child(2n) { animation-duration: 7.5s; animation-delay: -2s; }
.creeper .sway:nth-child(3n) { animation-duration: 5.5s; animation-delay: -1.2s; }
@keyframes creepSway { from { transform: rotate(-2.5deg); } to { transform: rotate(2.5deg); } }

/* ---------- flying critters ---------- */
.critter {
  position: fixed; z-index: 2; pointer-events: none; top: 0; left: 0;
  font-size: 1.5rem; opacity: 0;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.12));
}

/* ---------- layout ---------- */
.wrap {
  position: relative; z-index: 3;
  max-width: 880px; margin: 0 auto;
  padding: 20vh 6vw 14vh; text-align: center;
}
.eyebrow {
  font-family: 'Quicksand', sans-serif; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  font-size: 0.8rem; color: var(--fern); margin-bottom: 0.8rem;
}
h1 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: clamp(2.6rem, 8vw, 4.6rem); line-height: 1.02;
  margin: 0 0 0.6rem; color: var(--ink);
}
h1 .leaf { color: var(--fern); }
.subtitle {
  font-size: clamp(1.05rem, 2.6vw, 1.3rem);
  max-width: 40ch; margin: 0.3rem auto 0; font-weight: 500; color: #41513f;
}

.prompt {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: clamp(1.3rem, 3.4vw, 1.7rem);
  margin: 3rem 0 1.4rem; color: var(--ink);
}

/* ---------- movie cards ---------- */
.cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 0.9rem; margin: 0 auto 1.6rem; max-width: 720px;
}
.card {
  position: relative; cursor: pointer; border: none; font-family: inherit;
  font-weight: 600; font-size: 1.12rem; color: var(--ink);
  background: linear-gradient(160deg, #fbfaf0, #eef2e0);
  padding: 1.4rem 1rem 1.2rem; border-radius: 16px;
  box-shadow: 0 5px 14px rgba(44,58,43,0.14), inset 0 0 0 2px rgba(92,122,74,0.35);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.card:hover, .card:focus-visible {
  transform: translateY(-5px) rotate(-1deg);
  box-shadow: 0 12px 22px rgba(44,58,43,0.22), inset 0 0 0 2px var(--moss);
  outline: none;
}
.card .sprig { font-size: 1.2rem; display: block; margin-bottom: 0.35rem; }

/* ---------- "something else" ---------- */
.else-row {
  display: flex; gap: 0.6rem; max-width: 520px; margin: 1.4rem auto 0;
  align-items: stretch; flex-wrap: wrap; justify-content: center;
}
.else-row input {
  flex: 1 1 240px; min-width: 0; font-family: inherit; font-weight: 500;
  font-size: 1.1rem; padding: 0.8rem 1.1rem; border-radius: 12px;
  border: 2px solid rgba(92,122,74,0.55); background: rgba(255,255,255,0.8); color: var(--ink);
}
.else-row input::placeholder { color: rgba(44,58,43,0.5); }
.else-row button {
  font-family: inherit; font-weight: 600; font-size: 1.05rem;
  padding: 0.8rem 1.4rem; border: none; border-radius: 12px; cursor: pointer; color: #fff;
  background: linear-gradient(150deg, var(--moss), var(--fern));
  box-shadow: 0 6px 14px rgba(63,107,58,0.3); transition: transform 0.15s ease;
}
.else-row button:hover { transform: translateY(-2px); }

/* ---------- invitation overlay ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 6; display: none;
  align-items: center; justify-content: center; padding: 4vh 4vw;
  background: rgba(44,58,43,0.5); backdrop-filter: blur(3px);
}
.overlay.show { display: flex; animation: fadeIn 0.45s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.invite {
  position: relative; max-width: 540px; width: 100%;
  background:
    radial-gradient(ellipse 70% 40% at 15% 0%, rgba(92,122,74,0.16), transparent 60%),
    radial-gradient(ellipse 70% 40% at 90% 100%, rgba(201,106,138,0.14), transparent 60%),
    linear-gradient(165deg, #fcfbf1, #eef2e1);
  border-radius: 20px; padding: 2.4rem 2.1rem 2rem;
  box-shadow: 0 22px 50px rgba(44,58,43,0.4);
  border: 2px solid var(--moss);
  transform: scale(0.82) rotate(-1.5deg);
  animation: pop 0.5s cubic-bezier(.2,1.25,.4,1) forwards; text-align: center;
}
@keyframes pop { to { transform: scale(1) rotate(0deg); } }

/* leafy corner marks on the card */
.invite .corner { position: absolute; font-size: 1.4rem; opacity: 0.85; }
.invite .corner.a { top: 10px; left: 14px; }
.invite .corner.b { bottom: 10px; right: 14px; }

.invite .dearest {
  font-family: 'Fraunces', serif; font-style: italic; font-size: 1.4rem;
  color: var(--bloom); margin-bottom: 0.9rem;
}
.invite .ribbon {
  font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--fern); font-size: 0.78rem;
}
.invite h2 {
  font-family: 'Fraunces', serif; font-weight: 500;
  font-size: clamp(1.9rem, 6vw, 2.6rem); margin: 0.5rem 0 0.1rem; color: var(--ink);
}
.invite .movie-title {
  font-family: 'Fraunces', serif; font-weight: 500; font-style: italic;
  font-size: clamp(1.9rem, 6vw, 2.6rem);
  margin: 0.4rem 0 1.2rem; color: var(--bloom);
}
.detail-rows {
  display: inline-block; text-align: left; margin: 0.4rem auto 1.1rem;
  font-size: 1.12rem; font-weight: 500;
}
.detail-rows div { margin: 0.35rem 0; }
.detail-rows .ico { margin-right: 0.55rem; }
.note {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 1.15rem; line-height: 1.55; margin: 0.8rem auto 1.2rem;
  max-width: 40ch; color: var(--ink);
}
.sign { font-weight: 600; font-size: 1.05rem; color: var(--fern); margin-top: 0.4rem; }

.rsvp {
  font-family: inherit; font-weight: 600; font-size: 1.1rem; margin-top: 1.2rem;
  padding: 0.8rem 2rem; border: none; border-radius: 40px; cursor: pointer; color: #fff;
  background: linear-gradient(150deg, var(--moss), var(--fern));
  box-shadow: 0 8px 18px rgba(63,107,58,0.35); transition: transform 0.15s ease;
}
.rsvp:hover { transform: translateY(-3px) scale(1.04); }
.yay {
  margin-top: 0.9rem; font-family: 'Fraunces', serif; font-style: italic;
  font-size: 1.2rem; color: var(--fern); min-height: 1.5em;
}
.close-x {
  position: absolute; top: 8px; right: 14px; background: none; border: none;
  font-size: 1.5rem; cursor: pointer; color: var(--fern); line-height: 1;
}
</style>
</head>
<body>

  <!-- long trailing creepers down both sides (generated by script to match height) -->
  <div class="creeper left"  id="creeperL" aria-hidden="true"></div>
  <div class="creeper right" id="creeperR" aria-hidden="true"></div>

  <div class="wrap">
    <h1>🐦🌿 <span class="leaf">Anamya!</span> 🌿🐦</h1>

    <p class="prompt">What are we watching?</p>

    <div class="cards" id="cards"><!-- movie cards injected by script --></div>

    <div class="else-row">
      <input id="elseInput" type="text" placeholder="…or name your own" aria-label="Type a movie of your choice" />
      <button id="elseBtn">Pick 🍃</button>
    </div>
  </div>

  <!-- INVITATION OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="invite" id="invite">
      <button class="close-x" id="closeX" aria-label="Close">×</button>
      <span class="corner a">🌿</span><span class="corner b">🍂</span>
      <div class="dearest">Dearest Anamya,</div>
      <div class="ribbon">You're invited to a screening of</div>
      <h2 class="movie-title" id="chosenTitle">—</h2>

      <div class="detail-rows">
        <div><span class="ico">🗓️</span><span id="dWhen"></span></div>
        <div><span class="ico">📍</span><span id="dWhere"></span></div>
      </div>

      <p class="note" id="dNote"></p>
      <div class="sign" id="dSign"></div>

      <button class="rsvp" id="rsvpBtn">Count me in 🌱</button>
      <div class="yay" id="yay"></div>
    </div>
  </div>

<script>
/* =====================================================================
   LONG SIDE CREEPERS
   A vine winds top→bottom down the edge; leaves alternate left/right of
   the stem and a few small flowers tuck in, leaning toward the center.
   Same flat ellipse-leaf style + palette as the original corner foliage.
   ===================================================================== */
function buildCreeper(){
  const W = 230, H = Math.max(window.innerHeight, 700);
  const segs = Math.max(7, Math.round(H / 130));   // more nodes on taller screens
  // a gently winding stem path from top-left, curving inward as it descends
  let d = `M20 -10`;
  const nodes = [];
  for (let i=1;i<=segs;i++){
    const y = (H/segs)*i;
    const x = 26 + Math.sin(i*1.1)*22 + (i/segs)*70;   // drifts toward center lower down
    d += ` S ${x-30} ${y-40}, ${x} ${y}`;
    nodes.push({x, y, i});
  }
  let leaves = '', flowers = '';
  const moss = '#5c7a4a', fern = '#3f6b3a';
  nodes.forEach(({x,y,i}) => {
    // leaf pointing inward (toward center / right side of column)
    const inR = 18 + (i%3)*4;
    leaves += `<g class="sway"><ellipse cx="${x+inR}" cy="${y}" rx="${20}" ry="${9}" fill="${i%2?moss:fern}" transform="rotate(${30+ (i%2?0:18)} ${x+inR} ${y})"/></g>`;
    // smaller leaf pointing back outward
    const outR = 14;
    leaves += `<g class="sway"><ellipse cx="${x-outR}" cy="${y+6}" rx="${16}" ry="${7}" fill="${i%2?fern:moss}" transform="rotate(${-18 - (i%2?12:0)} ${x-outR} ${y+6})"/></g>`;
    // every 3rd node gets a little flower tucked by the vine
    if (i%3===1){
      const fx = x+inR+10, fy = y-6;
      flowers += `<g class="sway"><circle cx="${fx}" cy="${fy}" r="9" fill="#c96a8a"/><circle cx="${fx}" cy="${fy}" r="3.5" fill="#d9a441"/></g>`;
    } else if (i%4===0){
      const fx = x+inR+8, fy = y-2;
      flowers += `<g class="sway"><circle cx="${fx}" cy="${fy}" r="8" fill="#d9a441"/><circle cx="${fx}" cy="${fy}" r="3" fill="#c96a8a"/></g>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMinYMid slice" fill="none">`
       + `<path d="${d}" stroke="${fern}" stroke-width="5" fill="none" opacity="0.9"/>`
       + leaves + flowers + `</svg>`;
}
function paintCreepers(){
  document.getElementById('creeperL').innerHTML = buildCreeper();
  document.getElementById('creeperR').innerHTML = buildCreeper();
}
paintCreepers();
let _cT; window.addEventListener('resize', () => { clearTimeout(_cT); _cT = setTimeout(paintCreepers, 250); });

/* =====================================================================
   ┌──────────────────────────────────────────────────────────────┐
   │  CONFIG — edit these values to personalize everything.          │
   └──────────────────────────────────────────────────────────────┘
   ===================================================================== */
const CONFIG = {
  // Curated movie buttons — three options (plus the free-text box).
  movies: [
    "Ikiru",
    "Perfect Days",
    "Paterson"
  ],

  // Invitation card details:
  when:  "Whenever suits you — any time you like is perfect",
  where: "Your couch (with a sprinkling of Zoom)",
  note:  "It would mean the world to me if we could do this. I'm not sure how to do it perfectly, but I really wanna try ❤️🌿😭",
  signature: "— Suppu",

  // Light, understated reactions after RSVP (one chosen at random)
  rsvpReplies: [
    "It's a plan. 🌿",
    "Lovely — see you there.",
    "Saved you the best seat.",
    "Good choice, by the way."
  ]
};

/* ---------- build movie cards ---------- */
const SPRIGS = ['🌿','🍃','🌾','🌱','🍀','🌻'];
const cardsEl = document.getElementById('cards');
CONFIG.movies.forEach((title, i) => {
  const b = document.createElement('button');
  b.className = 'card';
  b.innerHTML = '<span class="sprig">' + SPRIGS[i % SPRIGS.length] + '</span>' + title;
  b.addEventListener('click', () => openInvite(title));
  cardsEl.appendChild(b);
});

/* ---------- "something else" ---------- */
const elseInput = document.getElementById('elseInput');
const elseBtn = document.getElementById('elseBtn');
function chooseElse() {
  const v = elseInput.value.trim();
  if (v) openInvite(v); else elseInput.focus();
}
elseBtn.addEventListener('click', chooseElse);
elseInput.addEventListener('keydown', e => { if (e.key === 'Enter') chooseElse(); });

/* ---------- open the invitation ---------- */
const overlay = document.getElementById('overlay');
let currentMovie = "";          // the movie showing on the card right now
function openInvite(title) {
  currentMovie = title;
  document.getElementById('chosenTitle').textContent = title;
  document.getElementById('dWhen').textContent  = CONFIG.when;
  document.getElementById('dWhere').textContent = CONFIG.where;
  document.getElementById('dNote').textContent  = CONFIG.note;
  document.getElementById('dSign').textContent  = CONFIG.signature;
  document.getElementById('yay').textContent = "";
  const inv = document.getElementById('invite');
  inv.style.animation = 'none'; void inv.offsetWidth; inv.style.animation = '';
  overlay.classList.add('show');
  flutter(10);
}

document.getElementById('rsvpBtn').addEventListener('click', () => {
  const r = CONFIG.rsvpReplies[Math.floor(Math.random() * CONFIG.rsvpReplies.length)];
  document.getElementById('yay').textContent = r;
  flutter(14);
  notifyRSVP(currentMovie);
});

/* =====================================================================
   EMAIL NOTIFICATION — on every "Count me in" click, silently POST to
   Web3Forms, which emails suprabath02@gmail.com. Includes the movie she
   chose (or typed). Fires every click; failures are ignored so the cute
   page never shows an error.
   ===================================================================== */
function notifyRSVP(movie){
  try {
    fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        access_key: 'f2f5a259-b022-412e-8a83-01fa120ae0ce',
        subject: 'Anamya said YES! 💚',
        from_name: 'Anamya',
        who: 'Anamya',
        movie: movie || '(no movie selected)',
        message: 'Anamya clicked "Count me in" — movie chosen: ' + (movie || '(none)')
      })
    }).catch(()=>{});
  } catch(e){ /* ignore */ }
}

document.getElementById('closeX').addEventListener('click', () => overlay.classList.remove('show'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });

/* =====================================================================
   BUTTERFLIES — only butterflies, of different kinds. Each one drifts
   slowly along a gentle wandering path while its wings flutter (a quick
   horizontal flap). No other insects or creatures.
   ===================================================================== */
const BUTTERFLIES = ['🦋','🦋','🦋','🦋']; // emoji butterflies
// a few tinted variants so they read as "different kinds"
const TINTS = ['none', 'hue-rotate(40deg)', 'hue-rotate(-35deg)', 'hue-rotate(80deg) saturate(1.3)', 'hue-rotate(140deg)'];

// keep the screen calm — never more than this many butterflies at once
const MAX_BUTTERFLIES = 6;
let activeButterflies = 0;

function launchButterfly() {
  if (activeButterflies >= MAX_BUTTERFLIES) return;   // at capacity, skip
  activeButterflies++;
  const el = document.createElement('div');
  el.className = 'critter';
  const wing = document.createElement('span');
  wing.textContent = '🦋';
  wing.style.display = 'inline-block';
  // wings flutter: fast horizontal squash, like flapping seen at an angle
  wing.animate(
    [ { transform: 'scaleX(1)' }, { transform: 'scaleX(0.45)' } ],
    { duration: 200 + Math.random()*140, direction: 'alternate', iterations: Infinity, easing: 'ease-in-out' }
  );
  el.appendChild(wing);
  el.style.fontSize = (1.1 + Math.random() * 1.2) + 'rem';
  el.style.filter = TINTS[Math.floor(Math.random()*TINTS.length)];
  document.body.appendChild(el);

  const w = window.innerWidth, h = window.innerHeight;
  const leftToRight = Math.random() < 0.5;

  /* Build a wandering path of waypoints across the screen. Between
     waypoints the butterfly eases in/out (so it speeds up and slows down),
     drifts vertically, and occasionally backtracks — never a straight line.
     A constant fast bob + slight rotation is layered on top for life. */
  const startX = leftToRight ? -50 : w + 50;
  const dir = leftToRight ? 1 : -1;
  const legs = 5 + Math.floor(Math.random() * 4);      // number of waypoints
  const pts = [];
  let x = startX, y = Math.random() * h * 0.7 + h * 0.1;
  pts.push({ x, y });
  const span = (w + 100) / legs;
  for (let i = 1; i <= legs; i++) {
    // mostly forward, but each hop varies and can briefly drift back
    x += dir * span * (0.6 + Math.random() * 0.9) - dir * (Math.random() < 0.25 ? span*0.5 : 0);
    y += (Math.random() - 0.5) * h * 0.4;
    y = Math.max(h*0.04, Math.min(h*0.9, y));
    pts.push({ x, y });
  }
  pts.push({ x: leftToRight ? w + 60 : -60, y: y + (Math.random()-0.5)*h*0.3 });

  // per-leg durations vary a lot → uneven, lifelike pacing
  const legDur = pts.slice(1).map(() => 1600 + Math.random() * 2600);
  const total = legDur.reduce((a,b)=>a+b, 0);

  const ease = t => t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;   // easeInOut
  const start = performance.now();
  const bobAmp = 8 + Math.random()*10, bobRate = 0.006 + Math.random()*0.004;
  const wobPhase = Math.random()*Math.PI*2;

  function frame(now){
    const elapsed = now - start;
    // fade in at the very start, fade out near the end
    const opacity = Math.min(1, elapsed/900) * Math.min(1, (total - elapsed)/1200);
    if (elapsed >= total){ el.remove(); activeButterflies--; return; }
    // find current leg
    let acc = 0, leg = 0;
    while (leg < legDur.length-1 && acc + legDur[leg] < elapsed){ acc += legDur[leg]; leg++; }
    const lt = ease(Math.min(1, (elapsed - acc) / legDur[leg]));
    const a = pts[leg], b = pts[leg+1];
    let px = a.x + (b.x - a.x) * lt;
    let py = a.y + (b.y - a.y) * lt;
    // fast vertical bob + a little horizontal wobble = fluttery hover
    py += Math.sin(elapsed * bobRate) * bobAmp;
    px += Math.cos(elapsed * bobRate * 0.7 + wobPhase) * 6;
    // face direction of travel; tilt slightly with the bob
    const facing = (b.x >= a.x) ? -1 : 1;
    const tilt = Math.sin(elapsed * bobRate) * 7;
    el.style.opacity = opacity;
    el.style.transform = `translate(${px}px, ${py}px) scaleX(${facing}) rotate(${tilt}deg)`;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* a gentle burst (used when the invite opens / RSVP clicked) */
function flutter(n) { for (let i = 0; i < n; i++) setTimeout(launchButterfly, i * 200); }

/* ambient butterflies, sparse and slow */
setInterval(launchButterfly, 3600);
for (let i = 0; i < 3; i++) setTimeout(launchButterfly, i * 1200);
</script>
</body>
</html>
